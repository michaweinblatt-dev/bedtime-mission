<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Website</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons for graphics -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Canvas Confetti for fun completion effect -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Smooth scrolling for anchor links */
        html {
            scroll-behavior: smooth;
        }
        /* Fun animations */
        @keyframes bounce-pop {
            0% { transform: scale(0.90); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .task-done-anim {
            animation: bounce-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .shake-anim {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        @keyframes rocket-fly {
            0%, 100% { transform: translate(0, 0) rotate(135deg); }
            50% { transform: translate(6px, 6px) rotate(135deg); }
        }
        .animate-rocket-fly {
            animation: rocket-fly 1.5s ease-in-out infinite;
        }
        /* Custom scrollbar for sibling tabs */
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.5); 
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-gradient-to-b from-indigo-900 via-purple-900 to-slate-900 min-h-screen text-white font-sans antialiased overflow-x-hidden flex flex-col selection:bg-pink-500 selection:text-white">

    <!-- Header -->
    <header class="pt-12 pb-4 px-4 text-center z-10 relative">
        <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-400 via-purple-300 to-indigo-300 drop-shadow-lg mb-2">
            Bedtime Mission! 🚀
        </h1>
        <p class="text-indigo-200 text-lg font-medium max-w-xl mx-auto">Race the clock to finish your missions! If you complete them all, your parents have to play a silly mini-game with you!</p>
        
        <!-- Gentle Timer -->
        <div id="mission-timer" class="inline-block mt-4 px-4 py-1 rounded-full bg-slate-800/50 border border-indigo-500/30 text-indigo-300 font-mono text-xl opacity-0 transition-opacity duration-500 shadow-inner mb-2">
            Time: <span id="current-time-display">00:00</span>
            <span id="best-time-container" class="hidden text-pink-400 ml-2 border-l border-indigo-500/30 pl-2">
                Best: <span id="best-time-display">--:--</span>
            </span>
        </div>
    </header>

    <!-- Profile/Sibling Bar -->
    <div class="max-w-4xl mx-auto w-full px-4 mb-4 z-10 relative">
        <div id="profile-selector" class="flex justify-center sm:justify-start gap-3 overflow-x-auto pb-3 custom-scrollbar px-2">
            <!-- Sibling Tabs will be generated here -->
        </div>
    </div>

    <!-- Progress Bar -->
    <div class="max-w-3xl mx-auto w-full px-6 mb-8 z-10 relative">
        <div class="bg-slate-800/80 rounded-full h-10 border-4 border-indigo-400/30 overflow-hidden relative shadow-2xl backdrop-blur-sm">
            <div id="progress-fill" class="bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 h-full w-[40px] transition-all duration-700 ease-out flex items-center justify-end pr-2 shadow-[0_0_20px_rgba(236,72,153,0.8)]">
                <i data-lucide="rocket" class="w-6 h-6 text-white transform rotate-45 animate-pulse"></i>
            </div>
        </div>
        <p id="progress-text" class="text-center mt-3 text-indigo-200 font-bold text-2xl drop-shadow-md">0 / 6 Missions Complete</p>
    </div>

    <!-- Task Grid -->
    <main id="task-list" class="max-w-4xl mx-auto w-full px-4 pb-10 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 flex-grow z-10 relative">
        <!-- Tasks will be generated here by JavaScript -->
    </main>

    <!-- Parent Settings Footer -->
    <div class="mt-auto py-6 flex justify-center z-10 relative">
        <button onclick="toggleEditMode()" id="edit-toggle-btn" class="text-indigo-400 hover:text-white text-sm flex items-center gap-2 transition-colors bg-slate-800/50 px-4 py-2 rounded-full border border-indigo-500/20">
            <i data-lucide="settings" class="w-4 h-4"></i> <span>Parent Settings</span>
        </button>
    </div>

    <!-- Success Modal overlay -->
    <div id="success-message" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/95 backdrop-blur-md transition-opacity duration-500">
        <div class="bg-gradient-to-b from-indigo-500 to-purple-600 p-1 rounded-3xl max-w-md w-full mx-4 transform scale-90 transition-transform duration-500 shadow-[0_0_50px_rgba(236,72,153,0.5)] h-[90vh] sm:h-auto overflow-y-auto" id="success-modal">
            <div class="bg-white rounded-[23px] p-6 sm:p-8 text-center h-full flex flex-col items-center min-h-full">
                
                <!-- Space Mission to Bed Logo -->
                <div class="relative w-28 h-28 sm:w-32 sm:h-32 mb-4 shrink-0">
                    <div class="absolute inset-0 bg-pink-400 rounded-full animate-ping opacity-30"></div>
                    <div class="relative bg-gradient-to-br from-indigo-900 to-purple-800 text-white rounded-full w-full h-full shadow-2xl shadow-indigo-500/50 overflow-hidden border-4 border-indigo-300 animate-bounce flex items-center justify-center">
                        <i data-lucide="moon" class="absolute top-3 right-4 w-6 h-6 text-yellow-200 opacity-80"></i>
                        <i data-lucide="star" class="absolute bottom-5 left-4 w-4 h-4 text-yellow-300 animate-pulse"></i>
                        <i data-lucide="bed" class="absolute bottom-3 right-4 w-10 h-10 text-indigo-300"></i>
                        <i data-lucide="rocket" class="absolute top-3 left-3 w-12 h-12 text-pink-400 drop-shadow-[0_0_15px_rgba(236,72,153,0.8)] animate-rocket-fly"></i>
                    </div>
                </div>

                <h2 class="text-3xl sm:text-4xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500 uppercase tracking-wide leading-tight">Mission<br>Complete!</h2>
                
                <p id="final-time" class="text-base sm:text-lg font-mono text-indigo-500 font-bold mb-4 bg-indigo-50 px-4 py-1 rounded-full border border-indigo-100"></p>

                <!-- Parent Reward Box -->
                <div class="bg-gradient-to-b from-slate-50 to-indigo-50 border-4 border-indigo-100 rounded-2xl p-4 sm:p-6 w-full mb-6 transform transition-all shadow-md relative mt-4 shrink-0">
                    <div class="bg-yellow-400 text-yellow-900 text-xs font-black uppercase tracking-widest py-1.5 px-4 rounded-full absolute -top-4 left-1/2 transform -translate-x-1/2 shadow-sm border border-yellow-300 whitespace-nowrap z-10">
                        🎉 You unlocked a parent mini-game! 🎉
                    </div>
                    
                    <p id="collection-tracker" class="text-xs font-bold text-indigo-400 uppercase tracking-wider mt-4 mb-1"></p>

                    <div class="flex items-center justify-center gap-2 mb-2">
                        <p id="reward-text" class="text-2xl sm:text-3xl font-black text-indigo-900 leading-tight"></p>
                        <button onclick="respinReward()" class="text-indigo-400 hover:text-white hover:bg-indigo-500 transition-all bg-indigo-100 rounded-full p-2" title="Respin for a different game!">
                            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <!-- Visible description -->
                    <div class="mt-4 bg-white/80 p-3 sm:p-4 rounded-xl border border-indigo-100 shadow-sm text-center">
                        <p class="text-xs font-bold text-pink-500 uppercase tracking-wider mb-1">Parent Instructions:</p>
                        <p id="reward-description" class="text-sm sm:text-base font-medium text-indigo-800 transition-all leading-snug"></p>
                    </div>
                    
                    <!-- Hidden Music Player for the Dance Party -->
                    <div id="music-container" class="mt-4 hidden w-full rounded-xl overflow-hidden shadow-inner"></div>
                </div>
                
                <button onclick="resetMissions()" class="mt-auto bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-black py-4 px-8 rounded-full shadow-lg hover:shadow-2xl transition-all duration-200 hover:scale-105 active:scale-95 w-full text-lg sm:text-xl uppercase tracking-wider flex items-center justify-center gap-3 shrink-0">
                    <i data-lucide="rocket" class="w-6 h-6"></i> Play Again
                </button>
            </div>
        </div>
    </div>

    <!-- Custom Modal for Prompts/Confirms (Replaces blocked browser alerts) -->
    <div id="custom-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full mx-4 shadow-2xl transform transition-transform duration-200 scale-95" id="custom-modal-inner">
            <h3 id="custom-modal-title" class="text-2xl font-black text-indigo-900 mb-2">Title</h3>
            <p id="custom-modal-message" class="text-indigo-800 font-medium mb-4 hidden">Message</p>
            <input type="text" id="custom-modal-input" class="hidden w-full px-4 py-3 border-2 border-indigo-200 rounded-xl focus:outline-none focus:border-indigo-500 mb-4 text-slate-800 font-bold" placeholder="Type here...">
            <div class="flex justify-end gap-3 mt-4">
                <button id="custom-modal-cancel" class="px-5 py-2.5 rounded-full text-slate-500 font-bold hover:bg-slate-100 transition-colors">Cancel</button>
                <button id="custom-modal-confirm" class="px-5 py-2.5 rounded-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold hover:shadow-lg transition-all active:scale-95">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Background decorative stars -->
    <div class="fixed inset-0 z-0 pointer-events-none opacity-40">
        <div class="absolute top-10 left-10 text-white animate-pulse"><i data-lucide="star" class="w-4 h-4 fill-current"></i></div>
        <div class="absolute top-40 right-20 text-yellow-300 animate-pulse delay-75"><i data-lucide="star" class="w-6 h-6 fill-current"></i></div>
        <div class="absolute bottom-20 left-1/4 text-pink-300 animate-pulse delay-150"><i data-lucide="star" class="w-8 h-8 fill-current"></i></div>
        <div class="absolute top-1/3 left-1/2 text-indigo-300 animate-pulse delay-300"><i data-lucide="star" class="w-5 h-5 fill-current"></i></div>
    </div>

    <!-- Application Logic -->
    <script>
        // Default bedtime tasks
        const defaultTasks = [
            { id: 'brush', title: 'Brushing Teeth', icon: 'smile', color: 'from-cyan-400 to-blue-500', done: false },
            { id: 'bathroom', title: 'Bathroom', icon: 'droplet', color: 'from-blue-400 to-indigo-500', done: false },
            { id: 'inhaler', title: 'Inhaler', icon: 'wind', color: 'from-teal-400 to-emerald-500', done: false },
            { id: 'pajamas', title: 'Pajamas', icon: 'shirt', color: 'from-purple-400 to-fuchsia-500', done: false },
            { id: 'books', title: 'Reading Books', icon: 'book-open', color: 'from-orange-400 to-amber-500', done: false },
            { id: 'fun', title: 'Having Fun', icon: 'gamepad-2', color: 'from-pink-400 to-rose-500', done: false }
        ];

        // Factory to guarantee deep copies and completely independent lists
        function getFreshTasks() {
            return JSON.parse(JSON.stringify(defaultTasks));
        }

        // --- GLOBAL STATE MANAGEMENT (Sibling Mode) ---
        let appState = null;
        let tasks = [];
        let bestMissionTime = null;
        let unlockedGames = [];

        function loadState() {
            const savedState = localStorage.getItem('bedtime_mission_control_v2');
            
            if (savedState) {
                appState = JSON.parse(savedState);
                
                // Ensure Team Mission exists with completely independent tasks
                if (!appState.profiles['team_mission']) {
                    const currentProfileTasks = appState.profiles[appState.activeProfileId] ? 
                        JSON.parse(JSON.stringify(appState.profiles[appState.activeProfileId].tasks)) : getFreshTasks();
                    
                    appState.profiles['team_mission'] = {
                        name: 'Team Mission 🤝',
                        tasks: currentProfileTasks,
                        bestTime: null,
                        unlockedGames: [],
                        missionStartTime: null
                    };
                    saveState();
                }

                // Remove legacy default profile if they still have it
                if (appState.profiles['default_p1'] && appState.profiles['default_p1'].name === 'Astronaut 1') {
                    delete appState.profiles['default_p1'];
                    if (appState.activeProfileId === 'default_p1') {
                        appState.activeProfileId = 'team_mission';
                    }
                    saveState();
                }
            } else {
                // Migrate old data seamlessly
                const oldTasks = localStorage.getItem('bedtime_missions');
                const oldBest = localStorage.getItem('best_mission_time');
                const oldUnlocked = localStorage.getItem('unlocked_games_collection');

                appState = {
                    activeProfileId: 'team_mission', 
                    profiles: {
                        'team_mission': {
                            name: 'Team Mission 🤝',
                            tasks: oldTasks ? JSON.parse(oldTasks) : getFreshTasks(),
                            bestTime: oldBest ? parseInt(oldBest) : null,
                            unlockedGames: oldUnlocked ? JSON.parse(oldUnlocked) : [],
                            missionStartTime: null
                        }
                    }
                };
                saveState();
            }
            bindCurrentProfile();
        }

        function bindCurrentProfile() {
            const p = appState.profiles[appState.activeProfileId];
            tasks = p.tasks;
            bestMissionTime = p.bestTime;
            unlockedGames = p.unlockedGames;
            
            // Patch old saves that didn't have this field
            if (typeof p.missionStartTime === 'undefined') {
                p.missionStartTime = null;
                saveState();
            }
        }

        function saveState() {
            localStorage.setItem('bedtime_mission_control_v2', JSON.stringify(appState));
        }

        // Expanded Parent Rewards Library
        const parentRewards = [
            { title: "Robot Mode 🤖", desc: "Hop on for a piggyback ride to bed! The kid is the pilot and controls the parent robot. 'BEEP. BOOP. TURN LEFT.'" },
            { title: "The Buttons Game 🔘", desc: "Parent lays on the floor with knees up, kid sits on top. Parent holds hands up as 'control panels'. Kid clicks random fingers/buttons, and the parent reacts: tickle, bounce, slide, or silly noises! Make it your own." },
            { title: "Impromptu Dance Party 🕺💃", desc: "Tap the music button below! Everyone dances wildly for exactly one minute before getting right into bed." },
            { title: "The Floor is Lava 🌋", desc: "Quick! You have 10 seconds to get into bed without touching the lava (the floor)!" },
            { title: "Tickle Monster Attack 👾", desc: "The Tickle Monster has been unleashed for exactly 30 seconds!" },
            { title: "The Blanket Burrito 🌯", desc: "Roll the kid up tight in their duvet like a burrito! Extra points for adding 'cheese' (tickles) before eating." },
            { title: "Animal Charades 🐒", desc: "Parent has 30 seconds to act out an animal. Kid guesses! No noises allowed, just silly movements." }
        ];

        let isEditMode = false;
        let danceInterval = null;
        let isPlayingBeat = false;

        // --- SPACE SOUND EFFECTS & MUSIC ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function triggerHaptic() {
            if (navigator.vibrate) navigator.vibrate(40);
        }

        function playTaskSound(doneCount, totalCount) {
            initAudio();
            triggerHaptic();
            const time = audioCtx.currentTime + 0.05; 
            
            const progress = doneCount / totalCount;
            const baseFreq = 150 + (progress * 400); 
            const peakFreq = baseFreq * 2.5; 

            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sawtooth';
            osc1.frequency.setValueAtTime(baseFreq, time);
            osc1.frequency.exponentialRampToValueAtTime(peakFreq, time + 0.3);
            
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'square';
            osc2.frequency.setValueAtTime(baseFreq / 2, time);
            osc2.frequency.linearRampToValueAtTime(peakFreq / 2, time + 0.3);

            gain1.gain.setValueAtTime(0, time);
            gain1.gain.linearRampToValueAtTime(0.15, time + 0.05);
            gain1.gain.exponentialRampToValueAtTime(0.01, time + 0.3);

            gain2.gain.setValueAtTime(0, time);
            gain2.gain.linearRampToValueAtTime(0.1, time + 0.05);
            gain2.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
            
            osc1.connect(gain1);
            osc2.connect(gain2);
            gain1.connect(audioCtx.destination);
            gain2.connect(audioCtx.destination);
            
            osc1.start(time);
            osc2.start(time);
            osc1.stop(time + 0.3);
            osc2.stop(time + 0.3);
        }

        function playSuccessSound() {
            initAudio();
            const time = audioCtx.currentTime + 0.05;
            
            const frequencies = [440, 554.37, 659.25, 880]; 
            frequencies.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.value = freq;
                
                gainNode.gain.setValueAtTime(0, time);
                gainNode.gain.linearRampToValueAtTime(0.2, time + 0.1 + (index * 0.1));
                gainNode.gain.exponentialRampToValueAtTime(0.01, time + 1.5);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start(time + (index * 0.1));
                osc.stop(time + 1.5);
            });
        }

        function toggleDanceBeat() {
            initAudio();
            const btnText = document.getElementById('dance-btn-text');
            const btnIcon = document.getElementById('dance-btn-icon');

            if (isPlayingBeat) {
                clearInterval(danceInterval);
                isPlayingBeat = false;
                btnText.innerText = "Start Space Dance Beat!";
                btnIcon.setAttribute('data-lucide', 'play');
                lucide.createIcons();
                return;
            }

            isPlayingBeat = true;
            btnText.innerText = "Stop the Music 🛑";
            btnIcon.setAttribute('data-lucide', 'square');
            lucide.createIcons();

            let step = 0;
            const bpm = 135; 
            const intervalMs = (60 / bpm) * 1000 / 4; 

            danceInterval = setInterval(() => {
                const time = audioCtx.currentTime + 0.05;
                const seqLength = 128; 
                const currentStep = step % seqLength;
                const section = Math.floor(currentStep / 32); 
                const barStep = currentStep % 16; 
                const beat = currentStep % 4; 

                // Kick Drum
                if (beat === 0) {
                    const kick = audioCtx.createOscillator();
                    const kickGain = audioCtx.createGain();
                    kick.frequency.setValueAtTime(150, time);
                    kick.frequency.exponentialRampToValueAtTime(0.01, time + 0.3);
                    kickGain.gain.setValueAtTime(section === 1 ? 0.7 : 1, time); 
                    kickGain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
                    kick.connect(kickGain); kickGain.connect(audioCtx.destination);
                    kick.start(time); kick.stop(time + 0.3);
                }

                // Snare
                let playSnare = false;
                if (section >= 1 && (barStep === 4 || barStep === 12)) playSnare = true;
                if (section === 1 && currentStep >= 56) playSnare = (currentStep % 2 === 0); 
                if (section === 1 && currentStep >= 60) playSnare = true; 

                if (playSnare) {
                    const snare = audioCtx.createOscillator();
                    const snareGain = audioCtx.createGain();
                    snare.type = 'triangle';
                    snare.frequency.setValueAtTime(250, time);
                    snare.frequency.exponentialRampToValueAtTime(50, time + 0.1);
                    snareGain.gain.setValueAtTime(0.5, time);
                    snareGain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
                    snare.connect(snareGain); snareGain.connect(audioCtx.destination);
                    snare.start(time); snare.stop(time + 0.1);
                }

                // Hi-Hats
                if (section >= 2 && currentStep % 2 !== 0) {
                    const hat = audioCtx.createOscillator();
                    const hatGain = audioCtx.createGain();
                    hat.type = 'square';
                    hat.frequency.setValueAtTime(8000, time);
                    hatGain.gain.setValueAtTime(0.05, time);
                    hatGain.gain.exponentialRampToValueAtTime(0.01, time + 0.05);
                    hat.connect(hatGain); hatGain.connect(audioCtx.destination);
                    hat.start(time); hat.stop(time + 0.05);
                }

                // Bassline
                let noteFreq = 110;
                if (section === 0 || section === 1) {
                    if (barStep < 8) noteFreq = 110;
                    else if (barStep < 12) noteFreq = 164.81; 
                    else noteFreq = 146.83; 
                } else {
                    if (currentStep % 32 < 16) noteFreq = 110;
                    else if (currentStep % 32 < 24) noteFreq = 130.81;
                    else noteFreq = 98;
                }

                if (section === 1 && currentStep >= 56) {
                    noteFreq = 110 + ((currentStep - 56) * 20);
                }

                let playBass = false;
                if (section === 0) {
                    playBass = (currentStep % 4 === 0 || currentStep % 4 === 2); 
                } else if (section === 1) {
                    playBass = (currentStep % 2 === 0); 
                    if (currentStep >= 56) playBass = true; 
                } else {
                    playBass = true; 
                    if (currentStep % 16 === 15) playBass = false; 
                }

                if (playBass) {
                    const synth = audioCtx.createOscillator();
                    const synthGain = audioCtx.createGain();
                    synth.type = section >= 2 ? 'sawtooth' : 'square'; 
                    synth.frequency.value = noteFreq;
                    
                    synthGain.gain.setValueAtTime(0, time);
                    synthGain.gain.linearRampToValueAtTime(section >= 2 ? 0.15 : 0.08, time + 0.01);
                    synthGain.gain.exponentialRampToValueAtTime(0.01, time + (section >= 2 ? 0.15 : 0.2));
                    
                    synth.connect(synthGain); synthGain.connect(audioCtx.destination);
                    synth.start(time); synth.stop(time + (section >= 2 ? 0.15 : 0.2));
                }

                step++;
            }, intervalMs);
        }

        function stopDanceBeat() {
            if (isPlayingBeat) toggleDanceBeat();
        }

        // --- CUSTOM MODAL UI HELPER ---
        function showModal({ title, message, isPrompt, defaultValue, confirmText, onConfirm }) {
            const modal = document.getElementById('custom-modal');
            const inner = document.getElementById('custom-modal-inner');
            const titleEl = document.getElementById('custom-modal-title');
            const msgEl = document.getElementById('custom-modal-message');
            const inputEl = document.getElementById('custom-modal-input');
            const cancelBtn = document.getElementById('custom-modal-cancel');
            const confirmBtn = document.getElementById('custom-modal-confirm');

            titleEl.innerText = title;
            
            if (message) {
                msgEl.innerText = message;
                msgEl.classList.remove('hidden');
            } else {
                msgEl.classList.add('hidden');
            }

            if (isPrompt) {
                inputEl.value = defaultValue || '';
                inputEl.classList.remove('hidden');
            } else {
                inputEl.classList.add('hidden');
            }

            confirmBtn.innerText = confirmText || 'OK';

            modal.classList.remove('hidden');
            setTimeout(() => inner.classList.replace('scale-95', 'scale-100'), 10);

            if (isPrompt) inputEl.focus();

            const cleanup = () => {
                inner.classList.replace('scale-100', 'scale-95');
                setTimeout(() => modal.classList.add('hidden'), 150);
                cancelBtn.onclick = null;
                confirmBtn.onclick = null;
            };

            cancelBtn.onclick = cleanup;
            
            confirmBtn.onclick = () => {
                if (isPrompt) {
                    onConfirm(inputEl.value);
                } else {
                    onConfirm();
                }
                cleanup();
            };
        }

        // --- SIBLING PROFILE LOGIC ---
        function renderProfiles() {
            const container = document.getElementById('profile-selector');
            container.innerHTML = '';
            
            Object.keys(appState.profiles).forEach(id => {
                const profile = appState.profiles[id];
                const isActive = id === appState.activeProfileId;
                
                const btn = document.createElement('button');
                btn.className = `px-5 py-2.5 rounded-full font-extrabold text-sm transition-all shadow-sm flex items-center gap-2 border-2 flex-shrink-0 ${
                    isActive 
                    ? 'bg-indigo-500 text-white border-indigo-400 scale-105 shadow-indigo-500/50 shadow-lg z-10' 
                    : 'bg-slate-800/80 text-indigo-300 border-indigo-500/30 hover:bg-slate-700 hover:text-white'
                } ${isEditMode && isActive ? 'shake-anim border-pink-400' : ''}`;
                
                btn.onclick = () => switchProfile(id);
                btn.innerHTML = `<i data-lucide="user" class="w-4 h-4"></i> ${profile.name} ${isActive ? '<i data-lucide="edit-2" class="w-3 h-3 ml-1 text-indigo-200"></i>' : ''}`;
                container.appendChild(btn);
            });

            const addBtn = document.createElement('button');
            addBtn.className = "px-4 py-2.5 rounded-full font-bold text-sm transition-all shadow-sm flex items-center gap-2 bg-pink-500/10 text-pink-400 border-2 border-pink-500/30 hover:bg-pink-500/30 flex-shrink-0 border-dashed";
            addBtn.onclick = addSibling;
            addBtn.innerHTML = `<i data-lucide="plus" class="w-4 h-4"></i> Add Sibling`;
            container.appendChild(addBtn);
            
            lucide.createIcons();
        }

        function switchProfile(id) {
            if (id === appState.activeProfileId) {
                showModal({
                    title: "Rename Astronaut",
                    isPrompt: true,
                    defaultValue: appState.profiles[id].name,
                    confirmText: "Save",
                    onConfirm: (newName) => {
                        if (newName && newName.trim() !== '') {
                            appState.profiles[id].name = newName.trim();
                            saveState();
                            renderProfiles();
                        }
                    }
                });
                return;
            }
            performSwitch(id);
        }

        function performSwitch(id) {
            appState.activeProfileId = id;
            bindCurrentProfile();
            saveState(); // Saves the active profile choice immediately
            
            renderProfiles();
            renderTasks();
            updateProgress(false); // Update UI bar without triggering completion popups
            syncTimerUI();
        }

        function addSibling() {
            showModal({
                title: "Add Sibling",
                message: "What is the new astronaut's name?",
                isPrompt: true,
                confirmText: "Add",
                onConfirm: (name) => {
                    if (!name || name.trim() === '') return;
                    
                    const newId = 'profile_' + Date.now();
                    appState.profiles[newId] = {
                        name: name.trim(),
                        // Deep copy guarantees they don't share checkboxes!
                        tasks: JSON.parse(JSON.stringify(appState.profiles[appState.activeProfileId].tasks)),
                        bestTime: null,
                        unlockedGames: [],
                        missionStartTime: null
                    };
                    
                    // Uncheck everything for the new sibling
                    appState.profiles[newId].tasks.forEach(t => t.done = false);
                    saveState();
                    switchProfile(newId);
                }
            });
        }
        // ------------------------------

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function startTimer() {
            const p = appState.profiles[appState.activeProfileId];
            if (!p.missionStartTime) {
                p.missionStartTime = Date.now(); // Stamp time on their specific profile
                saveState();
                syncTimerUI();
            }
        }

        function stopTimer() {
            const p = appState.profiles[appState.activeProfileId];
            if (p) {
                p.missionStartTime = null;
                saveState();
            }
            syncTimerUI();
        }

        function syncTimerUI() {
            const p = appState.profiles[appState.activeProfileId];
            const timerEl = document.getElementById('mission-timer');
            const currentEl = document.getElementById('current-time-display');
            
            if (p && p.missionStartTime) {
                const elapsed = Math.floor((Date.now() - p.missionStartTime) / 1000);
                currentEl.innerText = formatTime(elapsed);
                timerEl.classList.remove('opacity-0');
            } else {
                currentEl.innerText = "00:00";
                timerEl.classList.add('opacity-0');
            }
            
            if (bestMissionTime) {
                document.getElementById('best-time-container').classList.remove('hidden');
                document.getElementById('best-time-display').innerText = formatTime(parseInt(bestMissionTime));
            } else {
                document.getElementById('best-time-container').classList.add('hidden');
            }
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btnSpan = document.querySelector('#edit-toggle-btn span');
            btnSpan.innerText = isEditMode ? "Done Editing" : "Parent Settings";
            
            if (isEditMode) {
                document.getElementById('edit-toggle-btn').classList.replace('text-indigo-400', 'text-pink-400');
            } else {
                document.getElementById('edit-toggle-btn').classList.replace('text-pink-400', 'text-indigo-400');
                saveState(); // Lock in settings
            }
            
            renderProfiles();
            renderTasks();
        }

        function removeTask(id, event) {
            event.stopPropagation(); 
            showModal({
                title: "Remove Mission?",
                message: "Are you sure you want to remove this mission from the list?",
                confirmText: "Remove",
                onConfirm: () => {
                    tasks = tasks.filter(t => t.id !== id);
                    appState.profiles[appState.activeProfileId].tasks = tasks; 
                    saveState();
                    renderTasks();
                    updateProgress(false);
                }
            });
        }

        function promptNewTask() {
            showModal({
                title: "Add Mission",
                message: "Enter a name for the new mission:",
                isPrompt: true,
                confirmText: "Add",
                onConfirm: (title) => {
                    if (title && title.trim() !== "") {
                        const colors = [
                            'from-cyan-400 to-blue-500', 'from-purple-400 to-fuchsia-500', 
                            'from-orange-400 to-amber-500', 'from-pink-400 to-rose-500',
                            'from-teal-400 to-emerald-500'
                        ];
                        const randomColor = colors[Math.floor(Math.random() * colors.length)];
                        
                        tasks.push({
                            id: 'task_' + Date.now(),
                            title: title.trim(),
                            icon: 'star', 
                            color: randomColor,
                            done: false
                        });
                        saveState();
                        renderTasks();
                        updateProgress(false);
                    }
                }
            });
        }

        function renderTasks() {
            const taskList = document.getElementById('task-list');
            taskList.innerHTML = '';

            tasks.forEach(task => {
                const btn = document.createElement('div');
                
                btn.className = `relative overflow-hidden group p-6 rounded-3xl border-4 transition-all duration-300 transform flex flex-col items-center justify-center gap-4 shadow-xl select-none cursor-pointer ${
                    task.done && !isEditMode
                    ? 'bg-slate-800/80 border-emerald-500 shadow-[0_0_20px_rgba(16,185,129,0.4)] opacity-80'
                    : `bg-gradient-to-br ${task.color} border-white/30 hover:border-white/60`
                } ${!isEditMode ? 'hover:scale-105 active:scale-95' : 'shake-anim'}`;
                
                btn.onclick = (e) => isEditMode ? removeTask(task.id, e) : toggleTask(task.id);

                if(task.done && !isEditMode) {
                   btn.classList.add('task-done-anim');
                }

                if (isEditMode) {
                    const deleteBadge = document.createElement('div');
                    deleteBadge.className = "absolute top-2 right-2 bg-red-500 text-white rounded-full p-2 shadow-lg";
                    deleteBadge.innerHTML = `<i data-lucide="trash-2" class="w-4 h-4"></i>`;
                    btn.appendChild(deleteBadge);
                }

                const iconContainer = document.createElement('div');
                iconContainer.className = `p-5 rounded-2xl shadow-inner flex items-center justify-center ${
                    task.done && !isEditMode ? 'bg-emerald-500 text-white' : 'bg-white/20 text-white backdrop-blur-sm'
                }`;
                
                const iconName = (task.done && !isEditMode) ? 'check-circle' : task.icon;
                iconContainer.innerHTML = `<i data-lucide="${iconName}" class="w-12 h-12 ${task.done && !isEditMode ? 'animate-pulse' : ''}"></i>`;

                const text = document.createElement('span');
                text.className = `font-extrabold text-xl md:text-2xl text-center ${
                    task.done && !isEditMode
                    ? 'text-emerald-400 line-through decoration-emerald-500 decoration-4' 
                    : 'text-white drop-shadow-md'
                }`;
                text.innerText = task.title;

                btn.appendChild(iconContainer);
                btn.appendChild(text);
                taskList.appendChild(btn);
            });

            if (isEditMode) {
                const addBtn = document.createElement('div');
                addBtn.className = "relative overflow-hidden group p-6 rounded-3xl border-4 border-dashed border-indigo-400/50 bg-slate-800/30 hover:bg-slate-800/60 transition-all duration-300 transform flex flex-col items-center justify-center gap-4 cursor-pointer";
                addBtn.onclick = promptNewTask;
                
                const iconContainer = document.createElement('div');
                iconContainer.className = "p-5 rounded-2xl flex items-center justify-center bg-indigo-500/20 text-indigo-300";
                iconContainer.innerHTML = `<i data-lucide="plus" class="w-12 h-12"></i>`;
                
                const text = document.createElement('span');
                text.className = "font-extrabold text-xl text-center text-indigo-300 drop-shadow-md";
                text.innerText = "Add Mission";

                addBtn.appendChild(iconContainer);
                addBtn.appendChild(text);
                taskList.appendChild(addBtn);
            }
            
            lucide.createIcons();
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            task.done = !task.done;
            saveState(); // Instantly save progress to storage!

            const doneCount = tasks.filter(t => t.done).length;

            if (doneCount === 1 && !appState.profiles[appState.activeProfileId].missionStartTime) {
                startTimer();
            }

            if (task.done) {
                playTaskSound(doneCount, tasks.length);
                confetti({
                    particleCount: 40,
                    spread: 60,
                    origin: { y: 0.9 },
                    colors: ['#10b981', '#34d399', '#ffffff'],
                    ticks: 100,
                    zIndex: 20
                });
            }

            if (doneCount === 0) stopTimer();

            renderTasks();
            updateProgress(true); // check for finale
        }

        function updateProgress(checkFinale = true) {
            const doneCount = tasks.filter(t => t.done).length;
            const totalCount = tasks.length;
            
            const percentage = totalCount === 0 ? 0 : (doneCount / totalCount) * 100;

            const progressFill = document.getElementById('progress-fill');
            const progressText = document.getElementById('progress-text');

            progressFill.style.width = percentage > 5 ? `${percentage}%` : '40px';
            progressText.innerText = `${doneCount} / ${totalCount} Missions Complete`;

            if (checkFinale && totalCount > 0 && doneCount === totalCount) {
                stopTimer();
                setTimeout(triggerSuccess, 800);
            }
        }

        function setRewardUI(rewardObj) {
            if (!unlockedGames.includes(rewardObj.title)) {
                unlockedGames.push(rewardObj.title);
                saveState();
            }

            document.getElementById('reward-text').innerText = rewardObj.title;
            document.getElementById('reward-description').innerText = rewardObj.desc;
            document.getElementById('collection-tracker').innerText = `You've collected ${unlockedGames.length} of ${parentRewards.length} mini-games!`;

            const musicContainer = document.getElementById('music-container');
            stopDanceBeat();
            musicContainer.innerHTML = ''; 
            musicContainer.classList.add('hidden');

            if (rewardObj.title.includes("Dance Party")) {
                musicContainer.classList.remove('hidden');
                musicContainer.innerHTML = `
                    <button onclick="toggleDanceBeat()" class="w-full bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-400 hover:to-rose-400 text-white font-bold py-4 px-6 rounded-xl shadow-lg transition-all transform hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-3">
                        <i id="dance-btn-icon" data-lucide="play" class="w-6 h-6 fill-current"></i>
                        <span id="dance-btn-text" class="text-lg uppercase tracking-wide">Start Space Dance Beat!</span>
                    </button>
                `;
                lucide.createIcons();
            }
        }

        function respinReward() {
            const randomReward = parentRewards[Math.floor(Math.random() * parentRewards.length)];
            setRewardUI(randomReward);
            
            const box = document.getElementById('reward-text').parentElement.parentElement;
            box.classList.add('scale-95', 'opacity-50');
            setTimeout(() => {
                box.classList.remove('scale-95', 'opacity-50');
            }, 150);
        }

        function triggerSuccess() {
            const modal = document.getElementById('success-message');
            const modalInner = document.getElementById('success-modal');
            
            const p = appState.profiles[appState.activeProfileId];
            const currentStart = p.missionStartTime;
            const elapsed = currentStart ? Math.floor((Date.now() - currentStart) / 1000) : 0;
            let timeMsg = `Time: ${formatTime(elapsed)}`;
            
            if (!bestMissionTime || elapsed < parseInt(bestMissionTime)) {
                bestMissionTime = elapsed;
                p.bestTime = elapsed; 
                saveState();
                timeMsg += ` — 🌟 NEW RECORD! 🌟`;
            }
            
            document.getElementById('final-time').innerText = timeMsg;

            const randomReward = parentRewards[Math.floor(Math.random() * parentRewards.length)];
            setRewardUI(randomReward);
            
            modal.classList.remove('hidden');
            
            setTimeout(() => {
                modalInner.classList.remove('scale-90');
                modalInner.classList.add('scale-100');
                fireBigConfetti();
                playSuccessSound();
            }, 50);
        }

        function resetMissions() {
            const modal = document.getElementById('success-message');
            const modalInner = document.getElementById('success-modal');
            
            stopDanceBeat();
            document.getElementById('music-container').innerHTML = '';

            modalInner.classList.remove('scale-100');
            modalInner.classList.add('scale-90');

            setTimeout(() => {
                modal.classList.add('hidden');
                
                // Reset just THIS sibling's missions and save
                tasks.forEach(t => t.done = false);
                saveState();
                
                stopTimer();
                renderTasks();
                updateProgress(false);
            }, 400);
        }

        function fireBigConfetti() {
            var duration = 4 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);

                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        window.onload = () => {
            loadState();
            lucide.createIcons();
            syncTimerUI();

            // Master clock ticks for whichever profile is currently active
            setInterval(() => {
                const p = appState.profiles[appState.activeProfileId];
                if (p && p.missionStartTime) {
                    const elapsed = Math.floor((Date.now() - p.missionStartTime) / 1000);
                    document.getElementById('current-time-display').innerText = formatTime(elapsed);
                }
            }, 1000);
            
            renderProfiles();
            renderTasks();
            updateProgress(false);
        };
    </script>
</body>
</html>
